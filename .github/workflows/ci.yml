name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Pin pnpm before setup-node's cache: 'pnpm' option, which shells out to `pnpm store path`.
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies (frozen lockfile — gate against unreviewed lockfile drift)
        run: pnpm install --frozen-lockfile

      # packages/crawler drives real Chromium via Playwright; its integration test needs the
      # browser binary present, which pnpm install alone does not fetch. apps/web's Playwright
      # E2E suite uses the same browser via @playwright/test.
      - name: Install Playwright Chromium
        run: pnpm --filter @brandkit/crawler exec playwright install --with-deps chromium

      - name: Build all packages (also type-checks, via tsc -b)
        run: pnpm build

      - name: Run unit/integration tests
        run: pnpm test

      - name: Lint
        run: pnpm lint

      - name: Check for circular/forbidden dependencies
        run: pnpm check:deps

      - name: Check formatting
        run: pnpm format:check

      # The literal Phase 5 acceptance criterion: a real browser drives a real `next dev` server
      # through submit -> progress -> rendered Brand Kit, against the crawler's local fixture
      # site — never a live site.
      - name: Run E2E tests
        run: pnpm test:e2e
